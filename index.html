<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Information Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .employee-info {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            display: none;
        }

        .employee-info.show {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
        }

        .error {
            color: #d32f2f;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            color: #667eea;
            margin-top: 10px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
            display: none;
            text-align: center;
        }

        .loading.show {
            display: block;
        }

        .config-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #666;
        }

        .config-section input {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Information</h1>
        
        <div class="config-section">
            <p><strong>Setup Instructions:</strong></p>
            <p style="margin-top: 5px;">1. Paste your Google Sheets ID below</p>
            <input type="text" id="sheetsId" placeholder="Paste Google Sheets ID here" style="width: 100%; padding: 8px;">
            <button onclick="setSheetId()" style="margin-top: 8px; padding: 8px; font-size: 12px;">Save Sheet ID</button>
            <p style="margin-top: 10px; color: #999;">Find your Sheet ID in the URL: docs.google.com/spreadsheets/d/<strong>SHEET_ID_HERE</strong>/edit</p>
        </div>

        <div class="form-group">
            <label for="employeeId">Employee ID:</label>
            <input type="text" id="employeeId" placeholder="Enter employee ID (e.g., E001, E002)">
        </div>

        <button onclick="searchEmployee()">Search</button>

        <div id="loading" class="loading">Loading employee data...</div>
        <div id="error" class="error"></div>

        <div id="employeeInfo" class="employee-info">
            <div class="info-row">
                <span class="info-label">Employee ID:</span>
                <span class="info-value" id="displayId"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Name:</span>
                <span class="info-value" id="displayName"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Workplace:</span>
                <span class="info-value" id="displayWorkplace"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Department:</span>
                <span class="info-value" id="displayDepartment"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Position:</span>
                <span class="info-value" id="displayPosition"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="info-value" id="displayEmail"></span>
            </div>
        </div>
    </div>

    <script>
        let employees = [];

        // Get sheet ID from localStorage or use default
        function initializeSheet() {
            const savedId = localStorage.getItem('googleSheetId');
            if (savedId) {
                document.getElementById('sheetsId').value = savedId;
                loadEmployeeData();
            }
        }

        // Save and load sheet ID
        function setSheetId() {
            const sheetsId = document.getElementById('sheetsId').value.trim();
            if (!sheetsId) {
                alert('Please paste a Google Sheets ID');
                return;
            }
            localStorage.setItem('googleSheetId', sheetsId);
            loadEmployeeData();
        }

        // Load data from Google Sheets
        async function loadEmployeeData() {
            const sheetsId = localStorage.getItem('googleSheetId');
            if (!sheetsId) {
                showError('Please set your Google Sheets ID first');
                return;
            }

            showLoading(true);
            try {
                // Google Sheets CSV export URL
                const url = `https://docs.google.com/spreadsheets/d/${sheetsId}/export?format=csv`;
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('Failed to fetch data. Check your Sheet ID and ensure it\'s publicly accessible.');
                }

                const csv = await response.text();
                employees = parseCSV(csv);
                showLoading(false);
                showSuccess(`Loaded ${employees.length} employees from Google Sheets`);
            } catch (error) {
                showLoading(false);
                showError(error.message);
            }
        }

        // Parse CSV data
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const employees = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                if (values.length < 1 || !values[0]) continue;

                const employee = {};
                headers.forEach((header, index) => {
                    employee[header] = values[index] || '';
                });
                employees.push(employee);
            }

            return employees;
        }

        // Search for employee
        function searchEmployee() {
            if (employees.length === 0) {
                showError('No employee data loaded. Please set your Google Sheets ID first.');
                return;
            }

            const employeeId = document.getElementById('employeeId').value.trim().toUpperCase();
            const errorDiv = document.getElementById('error');
            const infoDiv = document.getElementById('employeeInfo');

            errorDiv.classList.remove('show');
            infoDiv.classList.remove('show');

            if (!employeeId) {
                showError('Please enter an employee ID');
                return;
            }

            // Search for employee (match with 'id' or 'employee id' column)
            const employee = employees.find(emp => 
                (emp.id || emp['employee id'] || emp['employeeid'] || '').toUpperCase() === employeeId
            );

            if (!employee) {
                showError(`No employee found with ID: ${employeeId}`);
                return;
            }

            // Display employee information
            document.getElementById('displayId').textContent = employee.id || employee['employee id'] || '';
            document.getElementById('displayName').textContent = employee.name || employee['employee name'] || '';
            document.getElementById('displayWorkplace').textContent = employee.workplace || employee['work place'] || '';
            document.getElementById('displayDepartment').textContent = employee.department || '';
            document.getElementById('displayPosition').textContent = employee.position || employee['job title'] || '';
            document.getElementById('displayEmail').textContent = employee.email || '';

            infoDiv.classList.add('show');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function showLoading(show) {
            const loadingDiv = document.getElementById('loading');
            if (show) {
                loadingDiv.classList.add('show');
            } else {
                loadingDiv.classList.remove('show');
            }
        }

        function showSuccess(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.background = '#e8f5e9';
            errorDiv.style.color = '#2e7d32';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
        }

        // Allow search on Enter key press
        document.getElementById('employeeId').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchEmployee();
            }
        });

        // Initialize on page load
        window.addEventListener('load', initializeSheet);
    </script>
</body>
</html>
