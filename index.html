<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Information Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .employee-info {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            display: none;
        }

        .employee-info.show {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
        }

        .error {
            color: #d32f2f;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Information</h1>
        
        <div class="form-group">
            <label for="employeeId">Employee ID:</label>
            <input type="text" id="employeeId" placeholder="Enter employee ID (e.g., E001, E002)">
        </div>

        <button onclick="searchEmployee()">Search</button>

        <div id="error" class="error"></div>

        <div id="employeeInfo" class="employee-info">
            <div class="info-row">
                <span class="info-label">Employee ID:</span>
                <span class="info-value" id="displayId"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Name:</span>
                <span class="info-value" id="displayName"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Workplace:</span>
                <span class="info-value" id="displayWorkplace"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Department:</span>
                <span class="info-value" id="displayDepartment"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Position:</span>
                <span class="info-value" id="displayPosition"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="info-value" id="displayEmail"></span>
            </div>
        </div>
    </div>

    <script>
        // Sample employee data - replace with API call to your backend
        const employees = [
            {
                id: 'E001',
                name: 'John Smith',
                workplace: 'New York Office',
                department: 'Engineering',
                position: 'Senior Developer',
                email: 'john.smith@company.com'
            },
            {
                id: 'E002',
                name: 'Sarah Johnson',
                workplace: 'San Francisco Office',
                department: 'Product',
                position: 'Product Manager',
                email: 'sarah.johnson@company.com'
            },
            {
                id: 'E003',
                name: 'Mike Chen',
                workplace: 'Austin Office',
                department: 'Marketing',
                position: 'Marketing Specialist',
                email: 'mike.chen@company.com'
            },
            {
                id: 'E004',
                name: 'Emma Davis',
                workplace: 'Chicago Office',
                department: 'HR',
                position: 'HR Manager',
                email: 'emma.davis@company.com'
            }
        ];

        function searchEmployee() {
            const employeeId = document.getElementById('employeeId').value.trim().toUpperCase();
            const errorDiv = document.getElementById('error');
            const infoDiv = document.getElementById('employeeInfo');

            // Clear previous messages
            errorDiv.classList.remove('show');
            infoDiv.classList.remove('show');

            if (!employeeId) {
                errorDiv.textContent = 'Please enter an employee ID';
                errorDiv.classList.add('show');
                return;
            }

            // Search for employee
            const employee = employees.find(emp => emp.id === employeeId);

            if (!employee) {
                errorDiv.textContent = `No employee found with ID: ${employeeId}`;
                errorDiv.classList.add('show');
                return;
            }

            // Display employee information
            document.getElementById('displayId').textContent = employee.id;
            document.getElementById('displayName').textContent = employee.name;
            document.getElementById('displayWorkplace').textContent = employee.workplace;
            document.getElementById('displayDepartment').textContent = employee.department;
            document.getElementById('displayPosition').textContent = employee.position;
            document.getElementById('displayEmail').textContent = employee.email;

            infoDiv.classList.add('show');
        }

        // Allow search on Enter key press
        document.getElementById('employeeId').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchEmployee();
            }
        });
    </script>
</body>
</html>
